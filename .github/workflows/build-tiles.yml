name: Build Tiles

on:
  schedule:
    - cron: "23 * * * *" # hourly, off the top of the hour (GitHub delays :00 jobs)
  workflow_dispatch: # manual trigger

concurrency:
  group: tile-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tippecanoe jq

      - name: Configure AWS CLI for R2
        run: |
          aws configure set aws_access_key_id "${{ secrets.R2_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          aws configure set default.region auto

      - name: Build and upload tiles
        env:
          R2_DATA_BUCKET: flockhopper-data
          R2_TILES_BUCKET: flockhopper-tiles
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: bash tiles/cameras/build.sh
