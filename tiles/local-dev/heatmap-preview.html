<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Heatmap → Dots Preview</title>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
    #stats {
      position: absolute; top: 10px; left: 10px; z-index: 1;
      background: rgba(0,0,0,0.8); color: #fff; padding: 10px 14px;
      font: 13px/1.5 monospace; border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="stats">Loading…</div>
  <script>
    // Mirrors tiles/cameras/layers.json (camera-heat + camera-point + camera-glow).
    // Served via the local-dev server's /tiles endpoint: node server.js
    const TILEJSON_URL = 'http://localhost:3000/tiles/cameras-heatmap.json';

    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          cameras: { type: 'vector', url: TILEJSON_URL }
        },
        layers: [
          { id: 'background', type: 'background', paint: { 'background-color': '#1a1a2e' } },
          {
            id: 'camera-heat',
            type: 'heatmap',
            source: 'cameras',
            'source-layer': 'cameras',
            maxzoom: 13,
            paint: {
              'heatmap-weight': ['coalesce', ['get', 'point_count'], 1],
              'heatmap-intensity': [
                'interpolate', ['linear'], ['zoom'],
                0, 1, 9, 3, 13, 4
              ],
              'heatmap-radius': [
                'interpolate', ['exponential', 1.5], ['zoom'],
                0, 10, 4, 18, 8, 26, 11, 32, 13, 40
              ],
              'heatmap-color': [
                'interpolate', ['linear'], ['heatmap-density'],
                0, 'rgba(0,0,0,0)',
                0.15, 'rgba(69,10,10,0.45)',
                0.35, '#7f1d1d',
                0.55, '#b91c1c',
                0.75, '#ef4444',
                0.92, '#f97316',
                1, '#fde047'
              ],
              'heatmap-opacity': [
                'interpolate', ['linear'], ['zoom'],
                0, 0.85, 10, 0.85, 11, 0.7, 13, 0
              ]
            }
          },
          {
            id: 'camera-point',
            type: 'circle',
            source: 'cameras',
            'source-layer': 'cameras',
            minzoom: 11,
            paint: {
              'circle-color': '#dc2626',
              'circle-radius': 6,
              'circle-stroke-width': 2,
              'circle-stroke-color': '#fca5a5',
              'circle-stroke-opacity': ['interpolate', ['linear'], ['zoom'], 11, 0, 13, 1],
              'circle-opacity': ['interpolate', ['linear'], ['zoom'], 11, 0, 13, 1]
            }
          },
          {
            id: 'camera-glow',
            type: 'circle',
            source: 'cameras',
            'source-layer': 'cameras',
            minzoom: 11,
            paint: {
              'circle-color': '#ef4444',
              'circle-radius': ['interpolate', ['linear'], ['zoom'], 11, 6, 14, 14, 16, 18],
              'circle-opacity': ['interpolate', ['linear'], ['zoom'], 11, 0, 13, 0.3],
              'circle-blur': 0.6
            }
          }
        ]
      },
      center: [-98, 38],
      zoom: 4
    });

    const stats = document.getElementById('stats');
    function update() {
      stats.textContent = `zoom: ${map.getZoom().toFixed(2)}`;
    }
    map.on('move', update);
    map.on('load', update);

    map.on('click', 'camera-point', (e) => {
      const p = e.features[0].properties;
      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`<pre style="font-size:11px">${JSON.stringify(p, null, 2)}</pre>`)
        .addTo(map);
    });
  </script>
</body>
</html>
